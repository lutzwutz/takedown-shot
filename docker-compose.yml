services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info

  render:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191
      # No-auth residential proxy — this VPS's IP must be whitelisted in DataImpulse.
      - PROXY_SERVER=http://gw.dataimpulse.com:823
      - SHOT_SECRET=${SHOT_SECRET}
    depends_on:
      - flaresolverr
